# Sample NGINX config for plantbuddy.a42.casa
limit_req_zone $binary_remote_addr zone=plantbuddy_api_rl:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=plantbuddy_auth_rl:10m rate=2r/s;

server {
  listen 80;
  server_name plantbuddy.a42.casa;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name plantbuddy.a42.casa;

  ssl_certificate     /etc/letsencrypt/live/plantbuddy.a42.casa/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/plantbuddy.a42.casa/privkey.pem;

  client_max_body_size 30m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

  location / {
    limit_req zone=plantbuddy_api_rl burst=30 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_connect_timeout 10s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
  }

  location ~* ^/api/auth/ {
    limit_req zone=plantbuddy_auth_rl burst=10 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
